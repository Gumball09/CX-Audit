version: 1
applications:
  - appRoot: CX-audit-dashboard
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          # Static SPA build. TanStack Start (spa.enabled) prerenders the client
          # shell to dist/client/_shell.html; copy it to index.html so Amplify
          # static hosting serves it as the root + SPA fallback document.
          # VITE_API_BASE is injected from the Amplify console env vars at build time.
          commands:
            - npm run build
            - cp dist/client/_shell.html dist/client/index.html
      artifacts:
        baseDirectory: dist/client
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
